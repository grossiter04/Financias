<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #f4f7f6; --card-bg: #ffffff; --text-color: #333; --primary: #4F46E5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.2rem; }
        .total-gasto { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        canvas { max-width: 100%; margin-bottom: 10px; }
        
        /* Estilos do Formulário */
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #a5a5a5; cursor: not-allowed; }
        #statusMsg { font-size: 0.9rem; margin-top: 10px; color: #10B981; display: none; }
        .item-gasto { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item-gasto:last-child { border-bottom: none; }
        .item-info strong { display: block; font-size: 1rem; color: var(--text-color); }
        .item-info small { color: #6B7280; font-size: 0.85rem; }
        .item-valor { display: flex; align-items: center; gap: 10px; }
        .item-valor span { font-weight: bold; color: var(--primary); }
        .btn-apagar { background: none; border: none; padding: 5px; cursor: pointer; color: #EF4444; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .btn-apagar:hover { background-color: #FEE2E2; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Registrar Novo Gasto</h2>
            <div class="input-group">
                <input type="text" id="textoGasto" placeholder="Ex: Gastei 45 no mercado">
                <button id="btnEnviar" onclick="enviarGasto()">Enviar</button>
            </div>
            <div id="statusMsg">Processando com IA...</div>
        </div>

        <div class="card">
            <h2>Gasto Total</h2>
            <div class="total-gasto" id="valorTotal">R$ 0,00</div>
        </div>

        <div class="card">
            <h2>Gastos por Categoria</h2>
            <canvas id="graficoCategorias"></canvas>
        </div>
        <div class="card">
            <h2>Histórico Recente</h2>
            <div id="listaHistorico">
                </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://financias-api-pfa6.onrender.com/api'; // Mude para seu IP se for usar no celular
        let meuGrafico = null; // Guarda a instância do gráfico para podermos atualizá-lo

        async function carregarDados() {
            try {
                const response = await fetch(`${API_BASE}/gastos`);
                const json = await response.json();
                if (json.status === "sucesso") processarGraficos(json.dados);
            } catch (error) {
                console.error("Erro ao buscar:", error);
            }
        }

        async function enviarGasto() {
            const texto = document.getElementById('textoGasto').value;
            if (!texto) return;

            const btn = document.getElementById('btnEnviar');
            const status = document.getElementById('statusMsg');
            
            btn.disabled = true;
            status.style.display = 'block';
            status.style.color = '#4F46E5';
            status.innerText = 'Processando com IA...';

            try {
                const response = await fetch(`${API_BASE}/categorizar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto })
                });

                if (response.ok) {
                    document.getElementById('textoGasto').value = '';
                    status.style.color = '#10B981';
                    status.innerText = '✅ Salvo com sucesso!';
                    carregarDados(); // Recarrega os gráficos na hora!
                } else {
                    throw new Error("Erro na API");
                }
            } catch (error) {
                status.style.color = '#EF4444';
                status.innerText = '❌ Erro ao salvar.';
            } finally {
                btn.disabled = false;
                setTimeout(() => status.style.display = 'none', 3000);
            }
        }

        function processarGraficos(dados) {
            let total = 0;
            const gastosPorCategoria = {};

            dados.forEach(item => {
                let valor = typeof item.Valor === 'number' ? item.Valor : parseFloat(String(item.Valor).replace(',', '.'));
                let categoria = item.Categoria;

                if (!isNaN(valor)) {
                    total += valor;
                    gastosPorCategoria[categoria] = (gastosPorCategoria[categoria] || 0) + valor;
                }
            });

            document.getElementById('valorTotal').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            renderizarGrafico(Object.keys(gastosPorCategoria), Object.values(gastosPorCategoria));
            
            // NOVA CHAMADA AQUI:
            renderizarHistorico(dados);
        }

        function renderizarGrafico(labels, valores) {
            const ctx = document.getElementById('graficoCategorias').getContext('2d');
            
            // Destrói o gráfico antigo antes de desenhar o novo para não sobrepor
            if (meuGrafico) meuGrafico.destroy();
            
            meuGrafico = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: valores,
                        backgroundColor: ['#4F46E5', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#6B7280'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        // Função que desenha os itens na tela
        function renderizarHistorico(dados) {
            const lista = document.getElementById('listaHistorico');
            lista.innerHTML = '';

            if (dados.length === 0) {
                lista.innerHTML = '<p style="color: #6B7280; font-size: 0.9rem;">Nenhum gasto registrado ainda.</p>';
                return;
            }

            // Inverte o array para mostrar os mais novos no topo
            const dadosReversos = [...dados].reverse();

            dadosReversos.forEach(item => {
                const valorFormatado = item.Valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                // Fallback para lidar com nomes de colunas (Descrição ou Descricao)
                const descricao = item.Descrição || item.Descricao || 'Sem descrição';

                const div = document.createElement('div');
                div.className = 'item-gasto';
                div.innerHTML = `
                    <div class="item-info">
                        <strong>${descricao}</strong>
                        <small>${item.Data} • ${item.Categoria}</small>
                    </div>
                    <div class="item-valor">
                        <span>${valorFormatado}</span>
                        <button class="btn-apagar" onclick="apagarGasto(${item.id})" title="Apagar este gasto">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                lista.appendChild(div);
            });
        }

        // Função que comunica com o backend para excluir a linha
        async function apagarGasto(linhaId) {
            if (!confirm('Tem certeza que deseja apagar este gasto?')) return;

            try {
                const response = await fetch(`${API_BASE}/gastos/${linhaId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    carregarDados(); // Recarrega a tela com os dados atualizados
                } else {
                    alert('Erro ao tentar apagar o gasto.');
                }
            } catch (error) {
                console.error("Erro na exclusão:", error);
                alert('Falha na comunicação com o servidor.');
            }
        }

        carregarDados();
    </script>
</body>
</html>
